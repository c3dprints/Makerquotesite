<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>MakerQ downloads</title>
<style>
:root{--bg:#0b1623;--surface:#111e2e;--card:#162236;--input:#0d1928;--border:#1e3550;
  --blue:#00aaff;--blue-l:#33ccff;--orange:#ff6b1a;--orange-l:#ff8c3a;--green:#00e890;
  --text:#ddeeff;--muted:#9fb6d0}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.55}
a{color:var(--blue-l);text-decoration:none}
.nav{border-bottom:1px solid var(--border);background:rgba(11,22,35,.9)}
.nav-inner{max-width:920px;margin:0 auto;padding:12px 24px;display:flex;align-items:center;gap:14px}
.brand{font-weight:800;font-size:20px;letter-spacing:-.5px;color:var(--text)}.brand span{color:var(--orange-l)}
.tag{font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);
  border:1px solid var(--border);border-radius:999px;padding:3px 10px}
.right{margin-left:auto;display:flex;gap:10px;align-items:center}
.icon-btn{width:38px;height:38px;border-radius:11px;border:1px solid var(--border);background:var(--card);
  color:var(--text);cursor:pointer;display:inline-grid;place-items:center;padding:0;transition:all .15s}
.icon-btn:hover{border-color:var(--blue);transform:translateY(-2px)}
.icon-btn svg{width:18px;height:18px}
.wrap{max-width:920px;margin:0 auto;padding:40px 24px 60px}
h1{font-size:28px;margin:0 0 4px}
.sub{color:var(--muted);font-size:14px;margin:0 0 26px}
.hero{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:34px 28px;text-align:center;
  box-shadow:0 24px 60px rgba(0,0,0,.4);margin-bottom:20px;position:relative;overflow:hidden}
.hero::before{content:"";position:absolute;inset:0;
  background:radial-gradient(600px 200px at 50% 0,rgba(0,232,144,.12),transparent 70%)}
.hero .label{position:relative;color:var(--muted);font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
.big{position:relative;font-size:clamp(52px,12vw,92px);font-weight:800;line-height:1.05;margin:6px 0 2px;
  background:linear-gradient(100deg,var(--green),var(--blue-l));-webkit-background-clip:text;background-clip:text;color:transparent}
.hero .hint{position:relative;color:var(--muted);font-size:13px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:22px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px}
.stat .v{font-size:26px;font-weight:800}
.stat .k{color:var(--muted);font-size:13px;margin-top:2px}
table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden}
th,td{text-align:left;padding:11px 16px;font-size:14px;border-bottom:1px solid var(--border)}
th{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:1px}
td.n,th.n{text-align:right;font-variant-numeric:tabular-nums}
tr:last-child td{border-bottom:0}
tbody tr:hover{background:rgba(0,170,255,.05)}
.foot{color:var(--muted);font-size:13px;margin-top:18px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}
.msg{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:22px;color:var(--muted);text-align:center}
.msg.err{border-color:rgba(255,107,107,.4);color:#ffb0b0}
.spin{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--blue);
  border-radius:50%;animation:sp .7s linear infinite;vertical-align:-3px;margin-right:8px}
@keyframes sp{to{transform:rotate(360deg)}}
html[data-theme="light"]{--bg:#eef3f9;--surface:#fff;--card:#fff;--input:#eef2f8;--border:#d7e2f0;--text:#13233a;--muted:#59708a}
html[data-theme="light"] body{background:var(--bg)}
html[data-theme="light"] .nav{background:rgba(255,255,255,.86)}
@media(max-width:560px){.stats{grid-template-columns:1fr}}
/* GA dashboard */
.section{margin-top:36px}
.section h2{font-size:14px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin:0 0 16px;font-weight:800}
.panels{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.panel{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px 20px}
.panel h3{margin:0 0 14px;font-size:14px;color:var(--blue-l);font-weight:700}
.bars{display:grid;gap:11px}
.bar{display:grid;grid-template-columns:1fr auto;gap:4px 10px;align-items:center;font-size:13px}
.bar .lab{color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar .val{color:var(--muted);font-variant-numeric:tabular-nums;font-weight:700}
.bar .track{grid-column:1/-1;height:7px;border-radius:6px;background:var(--input);overflow:hidden}
.bar .fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--blue),var(--orange))}
.spark{display:flex;align-items:flex-end;gap:2px;height:72px;padding-top:6px}
.spark .col{flex:1;min-width:2px;background:linear-gradient(180deg,var(--blue-l),var(--blue));border-radius:2px 2px 0 0;opacity:.85}
.spark .col:hover{opacity:1}
.gamuted{color:var(--muted);font-size:13px}
@media(max-width:640px){.panels{grid-template-columns:1fr}}
</style>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a class="brand" href="./">Maker<span>Q</span></a>
    <span class="tag">Downloads</span>
    <div class="right">
      <button class="icon-btn" id="refresh" title="Refresh" aria-label="Refresh">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
      </button>
      <button class="icon-btn mq-theme-btn" type="button" aria-label="Toggle theme" title="Toggle theme">
        <svg class="mq-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        <svg class="mq-moon" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
      </button>
    </div>
  </div>
</nav>

<div class="wrap">
  <h1>MakerQ downloads</h1>
  <p class="sub">Live installer download counts from GitHub, every download of the <code>.exe</code>/<code>.dmg</code>, from anywhere (not just the site).</p>

  <div id="content"><div class="msg"><span class="spin"></span>Loading download counts&hellip;</div></div>
  <div id="ga"></div>
</div>

<script>
/* Theme */
(function(){
  var KEY="mq-theme",root=document.documentElement;
  function apply(t){root.setAttribute("data-theme",t);
    document.querySelectorAll(".mq-theme-btn").forEach(function(b){
      var s=b.querySelector(".mq-sun"),m=b.querySelector(".mq-moon");
      if(s)s.style.display=(t==="light")?"none":"block"; if(m)m.style.display=(t==="light")?"block":"none";});}
  var saved;try{saved=localStorage.getItem(KEY)}catch(e){}
  apply(saved||((window.matchMedia&&matchMedia("(prefers-color-scheme: light)").matches)?"light":"dark"));
  document.addEventListener("click",function(e){var b=e.target.closest&&e.target.closest(".mq-theme-btn");if(!b)return;
    var t=(root.getAttribute("data-theme")==="light")?"dark":"light";apply(t);try{localStorage.setItem(KEY,t)}catch(e){}});
})();

/* Download stats from the GitHub public API (no auth needed for public repos) */
var REPO = "c3dprints/MakerQ-download";
var API = "https://api.github.com/repos/" + REPO + "/releases?per_page=100";
function esc(s){return String(s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
function n(x){return Number(x||0).toLocaleString();}
function fdate(s){ if(!s) return ""; var d=new Date(s); var mo=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return mo[d.getMonth()]+" "+d.getDate()+", "+d.getFullYear(); }

function load(){
  var box=document.getElementById("content");
  box.innerHTML='<div class="msg"><span class="spin"></span>Loading download counts&hellip;</div>';
  fetch(API,{headers:{"Accept":"application/vnd.github+json"}})
    .then(function(r){ if(!r.ok) throw new Error(r.status===403?"GitHub rate limit reached, try again in a few minutes.":"GitHub API error "+r.status); return r.json(); })
    .then(function(rels){
      if(!Array.isArray(rels)||!rels.length){ box.innerHTML='<div class="msg">No releases found yet.</div>'; return; }
      var total=0, rows=[];
      rels.forEach(function(rel){
        var c=0;
        (rel.assets||[]).forEach(function(a){ if(/\.(exe|dmg|zip|pkg)$/i.test(a.name)) c+=(a.download_count||0); });
        total+=c;
        rows.push({tag:rel.tag_name||rel.name||"", date:rel.published_at, count:c});
      });
      var latest=rows[0]||{tag:"-",count:0};
      var html=''
        +'<div class="hero"><div class="label">Total installer downloads</div>'
        +'<div class="big">'+n(total)+'</div>'
        +'<div class="hint">across '+rows.length+' release'+(rows.length===1?"":"s")+' &middot; source: GitHub</div></div>'
        +'<div class="stats">'
        +'<div class="stat"><div class="v">'+esc(latest.tag)+'</div><div class="k">Latest release</div></div>'
        +'<div class="stat"><div class="v">'+n(latest.count)+'</div><div class="k">Downloads, latest release</div></div>'
        +'<div class="stat"><div class="v">'+rows.length+'</div><div class="k">Releases published</div></div>'
        +'</div>'
        +'<table><thead><tr><th>Release</th><th>Published</th><th class="n">Downloads</th></tr></thead><tbody>'
        +rows.map(function(r){return '<tr><td>'+esc(r.tag)+'</td><td>'+esc(fdate(r.date))+'</td><td class="n">'+n(r.count)+'</td></tr>';}).join("")
        +'</tbody></table>'
        +'<div class="foot"><span>Counts are per release and reset when a new version ships, the big number is the running total.</span>'
        +'<span>Updated '+new Date().toLocaleTimeString()+'</span></div>';
      box.innerHTML=html;
    })
    .catch(function(e){ box.innerHTML='<div class="msg err">'+esc(e.message||"Could not load download counts.")+'</div>'; });
}
/* Website analytics from Google Analytics, via the ga-stats Supabase relay */
var GA_ENDPOINT = "https://enyimtvgqzmpaiaeiyxj.supabase.co/functions/v1/ga-stats";
function maxOf(a){ return a && a.length ? a.reduce(function(m,x){return Math.max(m,x.count)},0) : 0; }
function barList(items){
  if(!items || !items.length) return '<div class="gamuted">No data yet.</div>';
  var mx=maxOf(items);
  return '<div class="bars">'+items.map(function(it){
    var w = mx>0 ? Math.max(3, Math.round(it.count/mx*100)) : 0;
    return '<div class="bar"><span class="lab">'+esc(it.name)+'</span><span class="val">'+n(it.count)+'</span>'
      +'<div class="track"><div class="fill" style="width:'+w+'%"></div></div></div>';
  }).join("")+'</div>';
}
function loadGA(){
  var box=document.getElementById("ga");
  box.innerHTML='<div class="section"><div class="msg"><span class="spin"></span>Loading website analytics&hellip;</div></div>';
  fetch(GA_ENDPOINT).then(function(r){ return r.json().catch(function(){return {};}).then(function(d){return {ok:r.ok,d:d};}); })
    .then(function(x){
      var d=x.d||{};
      if(d.error){ box.innerHTML='<div class="section"><div class="msg err">Google Analytics: '+esc(d.error)+'</div></div>'; return; }
      if(!d.configured){ box.innerHTML='<div class="section"><div class="msg">Website analytics not connected yet. Deploy the <code>ga-stats</code> function and add the <code>GA_PROPERTY_ID</code> + <code>GA_SERVICE_ACCOUNT</code> secrets to see downloads by country, device, source, and the 30-day trend.</div></div>'; return; }
      var topC=(d.countries||[]).slice(0,10), topS=(d.sources||[]).slice(0,6), buyC=(d.purchaseCountries||[]).slice(0,8);
      var days=d.days||[], dmax=maxOf(days);
      var spark = days.length
        ? '<div class="spark">'+days.map(function(x){var h=dmax>0?Math.max(4,Math.round(x.count/dmax*72)):4; return '<div class="col" title="'+esc(x.date)+': '+n(x.count)+' downloads" style="height:'+h+'px"></div>';}).join("")+'</div>'
        : '<div class="gamuted">No data yet.</div>';
      box.innerHTML=''
        +'<div class="section"><h2>Website analytics (Google Analytics &middot; '+esc(d.range||"last 30 days")+')</h2>'
        +'<div class="stats">'
        +'<div class="stat"><div class="v">'+n(d.totalDownloads)+'</div><div class="k">Download clicks (from the site)</div></div>'
        +'<div class="stat"><div class="v">'+n(d.totalPurchases)+'</div><div class="k">Purchases</div></div>'
        +'<div class="stat"><div class="v">'+((d.countries||[]).length)+'</div><div class="k">Countries</div></div>'
        +'</div>'
        +'<div class="panels">'
        +'<div class="panel"><h3>Downloads by country</h3>'+barList(topC)+'</div>'
        +'<div class="panel"><h3>By device</h3>'+barList(d.devices)+'</div>'
        +'<div class="panel"><h3>Top sources</h3>'+barList(topS)+'</div>'
        +'<div class="panel"><h3>Last 30 days</h3>'+spark+'</div>'
        +'<div class="panel"><h3>Purchases by country</h3>'+barList(buyC)+'</div>'
        +'</div></div>';
    })
    .catch(function(){ box.innerHTML='<div class="section"><div class="msg err">Could not reach the analytics relay.</div></div>'; });
}

document.getElementById("refresh").addEventListener("click", function(){ load(); loadGA(); });
load(); loadGA();
</script>
</body>
</html>
