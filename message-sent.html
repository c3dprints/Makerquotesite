<!doctype html>
<html lang="en">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Message received, MakerQ</title>
<meta name="description" content="Thanks for reaching out. Your message reached the MakerQ support desk.">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<style>
:root{--bg:#0b1623;--surface:#111e2e;--card:#162236;--input:#0d1928;--border:#1e3550;
  --blue:#00aaff;--blue-l:#33ccff;--orange:#ff6b1a;--orange-l:#ff8c3a;--green:#00e890;
  --text:#ddeeff;--muted:#9fb6d0}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.55}
a{color:var(--blue-l);text-decoration:none}
.nav{position:sticky;top:0;z-index:100;background:rgba(11,22,35,.9);backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--border)}
.nav-inner{max-width:1120px;margin:0 auto;padding:12px 24px;display:flex;align-items:center;gap:14px}
.brand{font-weight:800;font-size:20px;letter-spacing:-.5px;color:var(--text)}.brand span{color:var(--orange-l)}
.wrap{max-width:620px;margin:0 auto;padding:70px 24px;text-align:center}
.check{width:84px;height:84px;border-radius:50%;margin:0 auto 24px;display:grid;place-items:center;
  background:radial-gradient(circle at 50% 35%,rgba(0,232,144,.25),rgba(0,232,144,.08));
  border:1px solid rgba(0,232,144,.5);box-shadow:0 0 0 6px rgba(0,232,144,.06),0 18px 44px rgba(0,232,144,.18)}
.check svg{width:42px;height:42px;stroke:var(--green);stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}
.eyebrow{display:inline-block;font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--green);background:rgba(0,232,144,.1);border:1px solid rgba(0,232,144,.35);padding:6px 14px;border-radius:999px}
h1{font-size:clamp(28px,5vw,42px);margin:16px 0 12px;letter-spacing:-.5px}
.lead{color:var(--muted);font-size:18px;max-width:48ch;margin:0 auto 30px}
.btn{display:inline-flex;align-items:center;gap:8px;font-weight:700;font-size:16px;padding:14px 28px;border-radius:13px;
  border:none;background:linear-gradient(135deg,var(--orange),var(--orange-l));color:#fff;box-shadow:0 8px 26px rgba(255,107,26,.35)}
.btn:hover{filter:brightness(1.07)}
html[data-theme="light"]{--bg:#eef3f9;--surface:#ffffff;--card:#ffffff;--border:#d7e2f0;--text:#13233a;--muted:#59708a}
html[data-theme="light"] body{background:var(--bg)}
html[data-theme="light"] .nav{background:rgba(255,255,255,.86)}
</style>
</head>
<body>
<nav class="nav"><div class="nav-inner"><a class="brand" href="./">Maker<span>Q</span></a></div></nav>
<div class="wrap">
  <div class="check" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 12.5l5 5L20 6.5"/></svg></div>
  <span class="eyebrow">Message received</span>
  <h1>Thanks, we've got it</h1>
  <p class="lead">Your message reached our support desk and we'll get back to you at the email you provided. Talk soon.</p>
  <a class="btn" href="./">Back to MakerQ</a>
</div>
<script>
(function(){var t;try{t=localStorage.getItem("mq-theme")}catch(e){}
  document.documentElement.setAttribute("data-theme", t||((window.matchMedia&&matchMedia("(prefers-color-scheme: light)").matches)?"light":"dark"));})();
</script>
</body>
</html>
