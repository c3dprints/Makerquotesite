<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  /* Source template for og-image.png (1200x630). Rendered via headless Chrome.
     Edit this then re-run the render command in README/og note to regenerate. */
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1200px;height:630px;overflow:hidden}
  body{
    background:#0b1623;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:#ddeeff;position:relative;
  }
  /* gradient glow accents */
  .glow-a{position:absolute;top:-220px;right:-160px;width:620px;height:620px;border-radius:50%;
    background:radial-gradient(circle,rgba(255,107,26,.28),transparent 62%);filter:blur(8px)}
  .glow-b{position:absolute;bottom:-260px;left:-180px;width:640px;height:640px;border-radius:50%;
    background:radial-gradient(circle,rgba(0,170,255,.22),transparent 62%);filter:blur(8px)}
  .frame{position:absolute;inset:0;padding:70px 76px;display:flex;flex-direction:column;justify-content:space-between}
  /* wordmark */
  .brand{display:flex;align-items:center;gap:18px}
  .qbadge{width:74px;height:74px;border-radius:18px;background:#111e2e;border:1px solid #1e3550;
    display:flex;align-items:center;justify-content:center;font-size:52px;font-weight:800;
    background-clip:padding-box}
  .grad{background:linear-gradient(100deg,#33ccff,#ff8c3a);-webkit-background-clip:text;background-clip:text;color:transparent}
  .wordmark{font-size:40px;font-weight:800;letter-spacing:-.5px}
  .mid{max-width:1000px}
  .eyebrow{display:inline-block;font-size:20px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
    color:#33ccff;background:rgba(0,170,255,.1);border:1px solid rgba(0,170,255,.3);
    padding:8px 18px;border-radius:999px;margin-bottom:26px}
  h1{font-size:66px;line-height:1.08;font-weight:800;letter-spacing:-1.5px}
  .lead{margin-top:22px;font-size:29px;line-height:1.4;color:#9fb6d0;max-width:940px}
  .props{display:flex;gap:34px;font-size:23px;font-weight:600;color:#ddeeff}
  .props .dot{color:#ff8c3a;margin-right:12px}
  .props span{white-space:nowrap}
</style>
</head>
<body>
  <div class="glow-a"></div>
  <div class="glow-b"></div>
  <div class="frame">
    <div class="brand">
      <div class="qbadge grad">Q</div>
      <div class="wordmark">Maker<span class="grad">Q</span></div>
    </div>
    <div class="mid">
      <div class="eyebrow">Quoting software for 3D print shops</div>
      <h1>Turn messy quote requests into a<br><span class="grad">priced, ready-to-send</span> pipeline.</h1>
      <div class="lead">Intake forms, auto-pricing, and an order pipeline that runs on your own computer.</div>
    </div>
    <div class="props">
      <span><span class="dot">&#9679;</span>Runs on your computer</span>
      <span><span class="dot">&#9679;</span>No monthly fees</span>
      <span><span class="dot">&#9679;</span>Own your data</span>
    </div>
  </div>
</body>
</html>
